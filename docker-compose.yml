services:
  threadgate:
    container_name: threadgate
    image: ghcr.io/mikeo7/threadgate:latest
    build:
      context: .
      dockerfile: Dockerfile
    # Mandatory host networking for border routing and mDNS discovery.
    network_mode: host
    restart: unless-stopped

    # Prefer capabilities over full privileged mode (see README security section).
    privileged: false
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    # Bind-mounting /dev alone does not grant access; allow USB serial coordinators.
    device_cgroup_rules:
      - "c 188:* rmw"
      - "c 166:* rmw"
    group_add:
      - dialout

    volumes:
      - ./data:/data
      - /dev:/dev
      - /dev/serial:/dev/serial:ro
      - /sys/bus/usb:/sys/bus/usb:ro
      - /lib/modules:/lib/modules

    environment:
      - OTBR_RADIO_URL=
      - OTBR_BAUDRATE=460800
      - OTBR_PORT=8081
      - OTBR_AUTO_DISCOVER=true
      - OTBR_LOG_LEVEL=info
      # Optional: pre-seed HA URL/token (pairing via dashboard also writes /data/hass_config.json).
      - OTBR_HASS_URL=
      - OTBR_HASS_TOKEN=
